# alacritty.toml
# [env]
# TERM = "xterm-256color"

[window]
opacity = 0.9

[font]
size = 10

[scrolling]
history =  100000

[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = '#242424'
foreground = '#ffffff'

[colors.normal]
black  ='#242424'  # black
red    ='#f62b5a'  # red
green  ='#47b413'  # green
yellow ='#e3c401'  # yellow
blue   ='#24acd4'  # blue
magenta='#f2affd'  # magenta
cyan   ='#13c299'  # cyan
white  ='#e6e6e6'  # white

[cursor]
style = "Beam"
unfocused_hollow = true

[terminal]
shell = { program = '/bin/zsh' }

